<svg xmlns="http://www.w3.org/2000/svg" width="1920" height="1080" viewBox="0 0 1920 1080">
  <defs>
    <radialGradient id="g1" cx="15%" cy="20%" r="40%">
      <stop offset="0%" stop-color="#0ea5a6" stop-opacity="0.18"/>
      <stop offset="100%" stop-color="#0ea5a6" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="g2" cx="85%" cy="80%" r="50%">
      <stop offset="0%" stop-color="#7c3aed" stop-opacity="0.12"/>
      <stop offset="100%" stop-color="#7c3aed" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="g3" x1="0" x2="0" y1="0" y2="1">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.02"/>
      <stop offset="100%" stop-color="#ffffff" stop-opacity="0"/>
    </linearGradient>
    <filter id="grain">
      <feTurbulence type="fractalNoise" baseFrequency="0.8" numOctaves="2" stitchTiles="stitch" result="noise"/>
      <feColorMatrix type="saturate" values="0"/>
      <feBlend in="SourceGraphic" in2="noise" mode="overlay"/>
    </filter>
  </defs>

  <!-- Dark base slightly lighter than pure black for subtle visibility -->
  <rect width="100%" height="100%" fill="#07080a" />
  <!-- Slightly stronger glows but still subtle for dark theme -->
  <rect width="100%" height="100%" fill="url(#g1)" opacity="0.36" />
  <rect width="100%" height="100%" fill="url(#g2)" opacity="0.28" />
  <rect width="100%" height="100%" fill="url(#g3)" opacity="0.12" />
  <!-- subtle grid overlay to hint that background is interactive/parallax -->
  <g opacity="0.04" stroke="#ffffff">
    <defs>
      <pattern id="dots" x="0" y="0" width="40" height="40" patternUnits="userSpaceOnUse">
        <circle cx="2" cy="2" r="1" fill="#ffffff" />
      </pattern>
    </defs>
    <rect width="100%" height="100%" fill="url(#dots)" />
  </g>
  <!-- subtle central highlight to make background readability obvious -->
  <radialGradient id="centerGlow" cx="50%" cy="40%" r="40%">
    <stop offset="0%" stop-color="#ffffff" stop-opacity="0.02"/>
    <stop offset="100%" stop-color="#ffffff" stop-opacity="0"/>
  </radialGradient>
  <rect width="100%" height="100%" fill="url(#centerGlow)" />
</svg>
